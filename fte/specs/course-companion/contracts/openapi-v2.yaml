openapi: "3.0.3"
info:
  title: Course Companion FTE — Phase 2 Premium API
  version: "2.0.0"
  description: >
    LLM-enhanced endpoints for Pro and Team tier users only.
    Every endpoint checks user tier BEFORE making any LLM call.
    Free and Premium users receive 403 before any API cost is incurred.
    Every successful LLM call is logged to cost_logs table.

servers:
  - url: http://localhost:8001
    description: Local Phase 2 development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AdaptivePathRequest:
      type: object
      required: [completed_chapters, quiz_scores, struggling_topics, learning_goal]
      properties:
        completed_chapters:
          type: array
          items: { type: string }
          example: ["ch-001", "ch-002"]
        quiz_scores:
          type: object
          additionalProperties: { type: number }
          example: { "ch-001": 85, "ch-002": 70 }
        struggling_topics:
          type: array
          items: { type: string }
          example: ["MCP protocol"]
        learning_goal:
          type: string
          example: "Become proficient in agent factory patterns"

    AdaptivePathResponse:
      type: object
      properties:
        recommended_sequence:
          type: array
          items: { type: string }
          example: ["ch-003", "ch-005", "ch-004"]
        reasoning:
          type: string
        focus_areas:
          type: array
          items: { type: string }
        estimated_days:
          type: integer
        tokens_used:
          type: integer
          description: Actual tokens consumed (logged to cost_logs)
        cost_usd:
          type: number
          description: Estimated cost of this call

    AssessmentRequest:
      type: object
      required: [question, student_answer, reference_content]
      properties:
        question:
          type: string
          example: "Explain how MCP enables tool use in agents."
        student_answer:
          type: string
        reference_content:
          type: string
          description: Chapter content chunk used as grading rubric

    AssessmentResponse:
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        grade:
          type: string
          enum: [A, B, C, D, F]
        strengths:
          type: array
          items: { type: string }
        improvements:
          type: array
          items: { type: string }
        model_answer_hint:
          type: string
          description: Hint toward correct answer — NOT a full answer
        tokens_used:
          type: integer
        cost_usd:
          type: number

paths:
  /api/v2/premium/adaptive-path:
    post:
      summary: Generate personalised adaptive learning path
      description: >
        Pro and Team tier only. Tier check runs BEFORE LLM call.
        Free and Premium users receive 403 — no LLM cost incurred.
        Every successful call is logged to cost_logs.
        Estimated: ~2000 tokens, ~$0.018 per call.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdaptivePathRequest" }
      responses:
        "200":
          description: Personalised learning path from Claude Sonnet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdaptivePathResponse" }
        "401":
          description: Unauthorized — invalid or missing JWT
        "403":
          description: Pro or Team tier required
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail: { type: string, example: "Pro or Team tier required" }

  /api/v2/premium/assess:
    post:
      summary: LLM-graded open-ended assessment
      description: >
        Pro and Team tier only. Tier check runs BEFORE LLM call.
        Free and Premium users receive 403 — no LLM cost incurred.
        Every successful call is logged to cost_logs.
        Estimated: ~1500 tokens, ~$0.014 per call.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssessmentRequest" }
      responses:
        "200":
          description: Assessment result from Claude Sonnet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssessmentResponse" }
        "401":
          description: Unauthorized
        "403":
          description: Pro or Team tier required
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail: { type: string, example: "Pro or Team tier required" }
